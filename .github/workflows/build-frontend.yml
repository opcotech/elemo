name: Build front-end

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  changed-files:
    runs-on: ubuntu-latest
    name: changed-files
    outputs:
      all_changed_files: ${{ steps.changed-files.outputs.all_changed_files }}
      any_changed: ${{ steps.changed-files.outputs.any_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            web/**
      - name: List all changed files
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
          ANY_CHANGED: ${{ steps.changed-files.outputs.any_changed }}
        run: |
          echo Has changes: ${ANY_CHANGED}
          for file in ${ALL_CHANGED_FILES}; do
            echo "$file was changed"
          done

  lint:
    runs-on: "ubuntu-latest"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - name: Install tooling
        run: npm install -g pnpm
      - name: Lint
        run: make dep.frontend lint.frontend

  e2e-test:
    runs-on: "ubuntu-latest"
    needs:
      - lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - uses: actions/setup-go@v5
        with:
          go-version: "^1.22"
      - name: Install tooling
        run: |
          pip install jq yq
          npm install -g pnpm
      - name: Setup local env
        run: |
          ./scripts/setup.sh
          sed -i s/CI=false/CI=true/g web/.env.test.local
          sed -i s/PLAYWRIGHT_HEADLESS=false/PLAYWRIGHT_HEADLESS=true/g web/.env.test.local
      - name: Execute end-to-end tests
        run: make dep.frontend test.frontend.e2e
      - name: Stash test results
        uses: actions/upload-artifact@v4
        with:
          name: "unit-test-results"
          path: web/tests/results
          retention-days: 7

  chromatic:
    if: ${{ needs.changed-files.outputs.any_changed == 'true' }}
    runs-on: "ubuntu-latest"
    needs:
      - lint
      - changed-files
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
      - uses: actions/setup-go@v4
        with:
          go-version: "^1.22"
      - name: Install tooling
        run: npm install -g pnpm
      - name: Install dependencies
        run: |
          cd web
          pnpm install
          pnpm build:storybook
      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          skip: "dependabot/**"
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          autoAcceptChanges: "main"
          exitZeroOnChanges: true
          exitOnceUploaded: true
          onlyChanged: true
